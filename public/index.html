<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insight Companion</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <div class="brand-mark">SB</div>
          <div class="brand-copy">
            <h1>Study Buddy</h1>
          </div>
        </div>

        <div id="headerSearchRoot" class="header-search-root"></div>

        <div class="topbar-actions">
          <div class="streak-chip" id="streakRoot">Chuỗi 4 ngày</div>
          <button class="icon-button" type="button" aria-label="Thông báo">
            <span class="icon-dot"></span>
            🔔
          </button>
          <div id="providerStatusRoot" class="provider-status-root"></div>
          <div class="user-pill" aria-label="Người dùng">H</div>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar-column">
          <div id="sidebarRoot" class="sidebar-shell"></div>
        </aside>

        <section class="center-column">
          <div class="center-shell">
            <div id="conversationRoot" class="conversation-root"></div>

            <div class="composer-shell">
              <div id="composerRoot"></div>
              <div id="quickPrompts" class="quick-prompts"></div>
            </div>
          </div>
        </section>

        <aside class="context-column">
          <div id="profileRoot" class="context-shell"></div>
        </aside>
      </main>
    </div>

    <div id="modalRoot"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
